steps:
  - name: deploy-production
    image: node:22-bookworm-slim
    environment:
      VERCEL_TOKEN:
        from_secret: vercel_token
      VERCEL_ORG_ID:
        from_secret: vercel_org_id
      VERCEL_PROJECT_ID:
        from_secret: vercel_project_id
    commands:
      - test -n "$VERCEL_TOKEN"
      - test -n "$VERCEL_ORG_ID"
      - test -n "$VERCEL_PROJECT_ID"
      - apt-get update && apt-get install -y --no-install-recommends ca-certificates curl && rm -rf /var/lib/apt/lists/*
      - npm ci
      - npm install --global vercel@latest
      - vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
      - SPLNIT_CONFIRM_PRODUCTION_MIGRATION=I_UNDERSTAND_PRODUCTION_MIGRATIONS npm run db:migrate:production
      - vercel build --prod --token "$VERCEL_TOKEN"
      - vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
      - for attempt in 1 2 3 4 5; do curl --fail --silent --show-error --max-time 30 https://splnit.eu/api/health && break; if [ "$attempt" = "5" ]; then exit 1; fi; sleep 5; done
    when:
      - event: push
        branch: main
