name: E2E

on:
  pull_request:
  push:
    branches:
      - main
      - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect E2E-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            e2e:
              - 'app/**'
              - 'components/**'
              - 'i18n/**'
              - 'inngest/**'
              - 'lib/**'
              - 'messages/**'
              - 'public/**'
              - 'scripts/**'
              - 'styles/**'
              - 'tests/e2e/**'
              - 'middleware.ts'
              - 'proxy.ts'
              - 'next.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'playwright.config.ts'
              - 'tsconfig.json'

  playwright:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.e2e == 'true'
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: postgresql://splnit_ci:splnit_ci@localhost:5432/splnit_ci
      ENABLE_TEST_ROUTES: "true"
      NEXT_PUBLIC_ENABLE_TEST_ROUTES: "true"
      NODE_OPTIONS: --max-old-space-size=8192
      TEST_BYPASS_PLAN_GATE: "true"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: splnit_ci
          POSTGRES_USER: splnit_ci
          POSTGRES_PASSWORD: splnit_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U splnit_ci -d splnit_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Next build output
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-e2e-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**', 'components/**', 'i18n/**', 'lib/**', 'messages/**', 'styles/**', 'next.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-next-e2e-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-next-e2e-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Install PDF tooling
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Intake prioritization copy lint
        run: npm run lint:copy:intake-prioritization

      - name: Build
        run: npm run build

      - name: Prepare local demo database
        run: npm run db:migrate && npm run seed:helios-controls

      - name: Run public E2E
        run: npm run test:e2e:public
        env:
          CLERK_SECRET_KEY: ""
          ENABLE_LOCAL_DEMO_DATA: "false"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ""

      - name: Run local demo E2E
        run: npm run test:e2e:local-demo
        env:
          CLERK_SECRET_KEY: ""
          ENABLE_LOCAL_DEMO_DATA: "true"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ""

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
