name: Product safety

on:
  pull_request:
  push:
    branches:
      - main
      - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-product-gates:
    runs-on: ubuntu-latest
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Product safety smoke gates
        run: npm run ci:product-safety

      - name: Connector smoke gates
        run: npm run ci:connector-smokes

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=moderate --json > npm-audit-moderate.json || (cat npm-audit-moderate.json && exit 1)
