name: Lighthouse

on:
  pull_request:
  push:
    branches:
      - main
      - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      lighthouse: ${{ steps.filter.outputs.lighthouse }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Lighthouse-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            lighthouse:
              - 'app/(marketing)/**'
              - 'app/(demo)/**'
              - 'app/layout.tsx'
              - 'app/page.tsx'
              - 'components/**'
              - 'i18n/**'
              - 'lib/marketing/**'
              - 'lib/seo/**'
              - 'messages/**'
              - 'public/**'
              - 'styles/**'
              - '.lighthouserc.json'
              - 'next.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'

  lighthouse:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.lighthouse == 'true'
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ""
      CLERK_SECRET_KEY: ""
      CHROME_PATH: /usr/bin/google-chrome
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Next build output
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-lighthouse-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**', 'components/**', 'i18n/**', 'lib/**', 'messages/**', 'styles/**', 'next.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-next-lighthouse-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-next-lighthouse-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npx lhci autorun

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14
